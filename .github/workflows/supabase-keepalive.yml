name: Supabase Keepalive

# Verhindert, dass das Supabase-Free-Tier-Projekt wegen Inaktivität pausiert
# (Supabase pausiert nach ca. 7 Tagen ohne Zugriff). Läuft alle 3 Tage eine
# simple Leseanfrage gegen die DB, unabhängig davon ob die Seite besucht wird.

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            "https://mdwsojyxklocyhiavkex.supabase.co/rest/v1/classes?select=id&limit=1" \
            -H "apikey: sb_publishable_RyYiDj_iyxNQ9RSu2Ma9kw_QpkWXJjk"
