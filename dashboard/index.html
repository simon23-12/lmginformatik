<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — LMG INFORMATIK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06090f;
    --panel: #0b1220;
    --line: #1b2a42;
    --blue: #3d6fd6;
    --blue-bright: #6ea0ff;
    --orange: #f08a2c;
    --cream: #f2e9d8;
    --text: #c8d4e8;
    --dim: #5d7294;
    --green: #4caf7d;
    --yellow: #e0b23c;
    --red: #e0584f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Chakra Petch', sans-serif;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(1.2rem, 3vw, 2.5rem);
    border-bottom: 1px solid var(--line);
  }
  .brand { font-weight: 700; font-size: 1.05rem; letter-spacing: .28em; color: var(--cream); }
  .brand span { color: var(--orange); }
  .who {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem; color: var(--dim);
    text-align: right; line-height: 1.7;
  }
  #logoutBtn {
    cursor: pointer; margin-top: .5rem;
    font-family: 'IBM Plex Mono', monospace; font-size: .65rem; letter-spacing: .2em;
    text-transform: uppercase; color: var(--dim); background: transparent;
    border: 1px solid var(--line); border-radius: 4px; padding: .4em 1em;
  }
  #logoutBtn:hover { border-color: var(--orange); color: var(--orange); }

  main { max-width: 760px; margin: 0 auto; padding: clamp(1.2rem, 3vw, 2.5rem); }
  .section-title {
    font-weight: 700; font-size: 1.05rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--cream); margin-bottom: 1.2rem;
  }
  .crumbs {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem; letter-spacing: .1em;
    color: var(--dim); margin-bottom: 1.2rem;
  }
  .crumbs span { cursor: pointer; }
  .crumbs span:hover { color: var(--orange); }

  /* Fortschrittsbalken */
  .progress-block { margin-bottom: 1.8rem; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace; font-size: .65rem; letter-spacing: .1em;
    color: var(--dim); margin-bottom: .4rem; text-transform: uppercase;
  }
  .progress-track { width: 100%; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .progress-track i { display: block; height: 100%; background: var(--blue-bright); }
  .progress-track.big i { background: var(--orange); }
  .progress-track.mini { height: 5px; }

  /* Kapitel-Kacheln */
  .chapter-list { display: flex; flex-direction: column; gap: .8rem; }
  .chapter-card {
    cursor: pointer; background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 1.1rem 1.4rem; transition: border-color .2s;
  }
  .chapter-card:hover { border-color: var(--orange); }
  .chapter-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .6rem; }
  .chapter-num { color: var(--orange); font-family: 'IBM Plex Mono', monospace; font-size: .75rem; margin-right: .5em; }
  .chapter-title { font-weight: 600; font-size: 1rem; color: var(--cream); }
  .chapter-count { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; color: var(--dim); }

  /* Aufgaben */
  .task-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 1.4rem 1.6rem; margin-bottom: 1.2rem;
  }
  .task-title-row { display: flex; align-items: center; gap: .6em; margin-bottom: .5rem; }
  .task-title { font-weight: 600; font-size: 1rem; color: var(--cream); }
  .diff-dot {
    width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid var(--blue-bright); box-sizing: border-box;
  }
  .diff-dot[data-d="1"] { background: transparent; }
  .diff-dot[data-d="2"] { background: linear-gradient(to top, var(--blue-bright) 50%, transparent 50%); }
  .diff-dot[data-d="3"] { background: var(--blue-bright); }
  .diff-label {
    font-family: 'IBM Plex Mono', monospace; font-size: .6rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--dim);
  }
  .task-content { font-size: .92rem; line-height: 1.5; margin-bottom: 1rem; }
  .task-status {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace; font-size: .62rem; letter-spacing: .18em;
    text-transform: uppercase; padding: .3em .8em; border-radius: 3px; margin-bottom: .8rem;
  }
  .status-open { background: rgba(93,114,148,.2); color: var(--dim); }
  .status-submitted { background: rgba(61,111,214,.2); color: var(--blue-bright); }
  .status-green { background: rgba(76,175,125,.2); color: var(--green); }
  .status-yellow { background: rgba(224,178,60,.2); color: var(--yellow); }
  .status-red { background: rgba(224,88,79,.2); color: var(--red); }
  textarea {
    width: 100%; min-height: 100px; resize: vertical;
    background: var(--bg); color: var(--cream);
    border: 1px solid var(--line); border-radius: 4px;
    font-family: 'Chakra Petch', sans-serif; font-size: .95rem;
    padding: .7em .9em; margin-bottom: .8rem; outline: none;
  }
  textarea:focus { border-color: var(--blue-bright); }
  .feedback {
    font-family: 'IBM Plex Mono', monospace; font-size: .78rem;
    border-left: 2px solid var(--dim);
    padding: .6em .9em; margin-bottom: .8rem;
  }
  .feedback.green { color: var(--green); border-color: var(--green); background: rgba(76,175,125,.08); }
  .feedback.yellow { color: var(--yellow); border-color: var(--yellow); background: rgba(224,178,60,.08); }
  .feedback.red { color: var(--red); border-color: var(--red); background: rgba(224,88,79,.08); }
  .submit-btn {
    cursor: pointer; font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: .85rem;
    letter-spacing: .15em; text-transform: uppercase; color: #06090f; background: var(--orange);
    border: none; border-radius: 4px; padding: .6em 1.4em; transition: background .25s;
  }
  .submit-btn:hover { background: var(--blue-bright); }
  .empty { color: var(--dim); font-family: 'IBM Plex Mono', monospace; font-size: .85rem; }
</style>
</head>
<body>

<header>
  <div class="brand">LMG <span>INFORMATIK</span></div>
  <div class="who">
    <span id="whoName">…</span><br>
    <button id="logoutBtn" type="button">Abmelden</button>
  </div>
</header>

<main>
  <div class="crumbs" id="crumbs"></div>
  <div id="view"></div>
</main>

<script type="module">
import { supabase, guardPage, SITE_ROOT } from '../assets/supabase-client.js';

const EVAL_LABEL = { green: 'Richtig', yellow: 'Teilweise richtig', red: 'Nicht richtig' };
const DIFF_LABEL = { 1: 'leicht', 2: 'mittel', 3: 'schwer' };

const session = await guardPage('student');
if (session) {
  const { data: student } = await supabase
    .from('students')
    .select('id, display_name, class_id, classes(grade)')
    .eq('id', session.user.id)
    .single();

  document.getElementById('whoName').textContent = student.display_name;
  const grade = student.classes?.grade ?? 6;

  const view = document.getElementById('view');
  const crumbs = document.getElementById('crumbs');

  const { data: topics } = await supabase
    .from('topics')
    .select('id, title, order_index, tasks(id, title, content, order_index, difficulty)')
    .eq('grade', grade)
    .order('order_index');

  const { data: submissions } = await supabase
    .from('submissions')
    .select('task_id, answer_text, status, evaluation, feedback')
    .eq('student_id', student.id);

  const subByTask = Object.fromEntries((submissions ?? []).map(s => [s.task_id, s]));

  function chapterProgress(topic) {
    const tasks = topic.tasks ?? [];
    const done = tasks.filter(t => subByTask[t.id]).length;
    return { done, total: tasks.length };
  }

  function setCrumbs(items) {
    crumbs.innerHTML = items.map((it, i) =>
      `<span data-i="${i}">${it.label}</span>${i < items.length - 1 ? ' / ' : ''}`
    ).join('');
    crumbs.querySelectorAll('span').forEach(el => {
      el.addEventListener('click', () => items[+el.dataset.i].action());
    });
  }

  function showOverview() {
    setCrumbs([{ label: 'Kapitel', action: showOverview }]);

    const totals = (topics ?? []).reduce((acc, t) => {
      const p = chapterProgress(t);
      acc.done += p.done; acc.total += p.total;
      return acc;
    }, { done: 0, total: 0 });
    const overallPct = totals.total ? Math.round((totals.done / totals.total) * 100) : 0;

    view.innerHTML = `
      <div class="progress-block">
        <div class="progress-label"><span>Gesamtfortschritt Schuljahr</span><span>${totals.done} / ${totals.total}</span></div>
        <div class="progress-track big"><i style="width:${overallPct}%"></i></div>
      </div>
      <div class="section-title">Kapitel</div>
      <div class="chapter-list" id="chapterList"></div>
    `;

    const list = document.getElementById('chapterList');
    for (const topic of topics ?? []) {
      const p = chapterProgress(topic);
      const pct = p.total ? Math.round((p.done / p.total) * 100) : 0;
      const card = document.createElement('div');
      card.className = 'chapter-card';
      card.innerHTML = `
        <div class="chapter-top">
          <div><span class="chapter-num">${topic.order_index}</span><span class="chapter-title">${topic.title}</span></div>
          <span class="chapter-count">${p.total ? `${p.done} / ${p.total}` : 'bald verfügbar'}</span>
        </div>
        <div class="progress-track mini"><i style="width:${pct}%"></i></div>
      `;
      card.addEventListener('click', () => showChapter(topic));
      list.appendChild(card);
    }
  }

  function showChapter(topic) {
    setCrumbs([
      { label: 'Kapitel', action: showOverview },
      { label: `${topic.order_index} ${topic.title}`, action: () => showChapter(topic) },
    ]);

    const tasks = (topic.tasks ?? []).sort((a, b) => a.order_index - b.order_index);
    view.innerHTML = `<div class="section-title">${topic.order_index}. ${topic.title}</div><div id="taskList"></div>`;
    const listEl = document.getElementById('taskList');

    if (tasks.length === 0) {
      listEl.innerHTML = '<p class="empty">Für dieses Kapitel gibt es noch keine Aufgaben.</p>';
      return;
    }

    for (const task of tasks) {
      const sub = subByTask[task.id];
      const card = document.createElement('div');
      card.className = 'task-card';

      let statusClass = 'status-open', statusLabel = 'Offen';
      if (sub?.evaluation) { statusClass = `status-${sub.evaluation}`; statusLabel = EVAL_LABEL[sub.evaluation]; }
      else if (sub) { statusClass = 'status-submitted'; statusLabel = 'Eingereicht'; }

      card.innerHTML = `
        <div class="task-status ${statusClass}">${statusLabel}</div>
        <div class="task-title-row">
          <span class="diff-dot" data-d="${task.difficulty ?? ''}" title="${DIFF_LABEL[task.difficulty] ?? 'unbekannt'}"></span>
          <span class="diff-label">${DIFF_LABEL[task.difficulty] ?? ''}</span>
          <span class="task-title">${task.title}</span>
        </div>
        <div class="task-content">${task.content}</div>
        ${sub?.feedback ? `<div class="feedback ${sub.evaluation ?? ''}">Feedback: ${sub.feedback}</div>` : ''}
        <textarea placeholder="Deine Antwort …">${sub?.answer_text ?? ''}</textarea>
        <button class="submit-btn" type="button">Antwort speichern</button>
      `;

      const textarea = card.querySelector('textarea');
      const btn = card.querySelector('.submit-btn');
      btn.addEventListener('click', async () => {
        btn.textContent = 'Speichere …';
        await supabase.from('submissions').upsert({
          student_id: student.id,
          task_id: task.id,
          answer_text: textarea.value,
          status: 'submitted',
          evaluation: null,
          feedback: null
        }, { onConflict: 'student_id,task_id' });
        btn.textContent = 'Gespeichert ✓';
        setTimeout(() => (btn.textContent = 'Antwort speichern'), 1500);
      });

      listEl.appendChild(card);
    }
  }

  showOverview();
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = SITE_ROOT;
});
</script>
</body>
</html>
