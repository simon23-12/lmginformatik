<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehrer-Dashboard — LMG INFORMATIK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06090f;
    --panel: #0b1220;
    --line: #1b2a42;
    --blue: #3d6fd6;
    --blue-bright: #6ea0ff;
    --orange: #f08a2c;
    --cream: #f2e9d8;
    --text: #c8d4e8;
    --dim: #5d7294;
    --green: #4caf7d;
    --yellow: #e0b23c;
    --red: #e0584f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Chakra Petch', sans-serif;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(1.2rem, 3vw, 2.5rem);
    border-bottom: 1px solid var(--line);
  }
  .brand { font-weight: 700; font-size: 1.05rem; letter-spacing: .28em; color: var(--cream); }
  .brand span { color: var(--orange); }
  .who {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem; color: var(--dim);
    text-align: right; line-height: 1.7;
  }
  .who b { color: var(--blue-bright); font-weight: 500; }
  #logoutBtn {
    cursor: pointer; margin-top: .5rem;
    font-family: 'IBM Plex Mono', monospace; font-size: .65rem; letter-spacing: .2em;
    text-transform: uppercase; color: var(--dim); background: transparent;
    border: 1px solid var(--line); border-radius: 4px; padding: .4em 1em;
  }
  #logoutBtn:hover { border-color: var(--orange); color: var(--orange); }

  main { max-width: 900px; margin: 0 auto; padding: clamp(1.2rem, 3vw, 2.5rem); }
  .section-title {
    font-weight: 700; font-size: 1.05rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--cream); margin-bottom: 1.2rem;
  }
  .crumbs {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem; letter-spacing: .1em;
    color: var(--dim); margin-bottom: 1.4rem;
  }
  .crumbs span { cursor: pointer; }
  .crumbs span:hover { color: var(--orange); }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem; margin-bottom: 1rem;
  }
  .tile {
    cursor: pointer; background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 1.6rem; transition: border-color .2s;
  }
  .tile:hover { border-color: var(--orange); }
  .tile-title { font-weight: 600; font-size: 1.05rem; color: var(--cream); margin-bottom: .3rem; }
  .tile-sub { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; color: var(--dim); letter-spacing: .1em; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
  th, td { text-align: left; padding: .7em .8em; border-bottom: 1px solid var(--line); font-size: .88rem; }
  th { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); }
  .progress-bar { width: 100px; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: .6em; }
  .progress-bar i { display: block; height: 100%; background: var(--blue-bright); }

  .submission-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 1.2rem 1.4rem; margin-bottom: 1rem;
  }
  .submission-meta { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; color: var(--dim); letter-spacing: .1em; margin-bottom: .5rem; }
  .submission-answer { font-size: .92rem; margin-bottom: .9rem; line-height: 1.5; }
  .grade-row { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
  .grade-row input[type=text] {
    background: var(--bg); color: var(--cream); border: 1px solid var(--line); border-radius: 4px;
    font-family: 'Chakra Petch', sans-serif; font-size: .9rem; padding: .5em .7em;
  }
  .grade-row input.feedback-text { flex: 1; min-width: 180px; }
  .eval-btn {
    cursor: pointer; font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: .8rem;
    letter-spacing: .05em; color: #06090f;
    border: none; border-radius: 4px; padding: .55em 1rem;
  }
  .eval-btn.green { background: var(--green); }
  .eval-btn.yellow { background: var(--yellow); }
  .eval-btn.red { background: var(--red); }
  .eval-btn:hover { filter: brightness(1.15); }
  .already-graded {
    display: flex; align-items: center; gap: .6rem;
    font-family: 'IBM Plex Mono', monospace; font-size: .7rem; letter-spacing: .1em;
  }
  .eval-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 2px; }
  .eval-dot.green { background: var(--green); }
  .eval-dot.yellow { background: var(--yellow); }
  .eval-dot.red { background: var(--red); }
  .eval-dot.open { background: var(--blue-bright); }
  .eval-dot.pending { background: transparent; border: 1.5px solid var(--line); box-sizing: border-box; }
  .empty { color: var(--dim); font-family: 'IBM Plex Mono', monospace; font-size: .85rem; }
  .chapter-sub {
    font-family: 'IBM Plex Mono', monospace; font-size: .7rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--orange); margin: 1.2rem 0 .5rem;
  }
  .chapter-sub:first-of-type { margin-top: 0; }
  .dots { display: inline-block; margin-left: .6em; vertical-align: middle; }

  /* Aufgabenplaner */
  .topic-select {
    display: block; width: 100%; max-width: 420px; margin-bottom: 1.8rem;
    background: var(--panel); color: var(--cream); border: 1px solid var(--line); border-radius: 6px;
    font-family: 'Chakra Petch', sans-serif; font-size: .92rem; padding: .7em .9em;
    cursor: pointer; outline: none;
  }
  .topic-select:focus { border-color: var(--orange); }
  .page-group { margin-bottom: 1.6rem; }
  .page-group-head {
    display: flex; align-items: baseline; gap: .7em; margin-bottom: .6rem;
    font-family: 'IBM Plex Mono', monospace;
  }
  .page-num {
    background: var(--panel); border: 1px solid var(--line); border-radius: 4px;
    padding: .2em .6em; font-size: .75rem; color: var(--orange); letter-spacing: .05em;
  }
  .page-group-title { font-weight: 600; font-size: .92rem; color: var(--cream); }
  .plan-card {
    display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: .9rem 1.2rem; margin-bottom: .6rem;
  }
  .plan-card.is-live { border-color: var(--green); }
  .plan-main { flex: 1; min-width: 0; }
  .plan-title-row { display: flex; align-items: center; gap: .6em; margin-bottom: .3rem; }
  .plan-title { font-weight: 600; font-size: .92rem; color: var(--cream); }
  .diff-dot {
    width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid var(--blue-bright); box-sizing: border-box;
  }
  .diff-dot[data-d="1"] { background: transparent; }
  .diff-dot[data-d="2"] { background: linear-gradient(to top, var(--blue-bright) 50%, transparent 50%); }
  .diff-dot[data-d="3"] { background: var(--blue-bright); }
  .diff-label {
    font-family: 'IBM Plex Mono', monospace; font-size: .6rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--dim);
  }
  .plan-content {
    font-size: .82rem; color: var(--text); line-height: 1.4;
    white-space: pre-line;
  }
  .toggle-wrap { display: flex; flex-direction: column; align-items: center; gap: .3em; flex-shrink: 0; }
  .toggle-label {
    font-family: 'IBM Plex Mono', monospace; font-size: .58rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--dim);
  }
  .toggle-wrap.on .toggle-label { color: var(--green); }
  .switch { position: relative; width: 42px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track {
    position: absolute; inset: 0; cursor: pointer; background: var(--line);
    border-radius: 22px; transition: background .2s;
  }
  .switch-track::before {
    content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px;
    background: var(--cream); border-radius: 50%; transition: transform .2s;
  }
  .switch input:checked + .switch-track { background: var(--green); }
  .switch input:checked + .switch-track::before { transform: translateX(20px); }
</style>
</head>
<body>

<header>
  <div class="brand">LMG <span>INFORMATIK</span></div>
  <div class="who">
    <span id="whoName">…</span><br>
    <button id="logoutBtn" type="button">Abmelden</button>
  </div>
</header>

<main>
  <div class="crumbs" id="crumbs"></div>
  <div id="view"></div>
</main>

<script type="module">
import { supabase, guardPage, SITE_ROOT } from '../assets/supabase-client.js';

const session = await guardPage('teacher');
if (session) {
  const view = document.getElementById('view');
  const crumbs = document.getElementById('crumbs');

  // Anzeigename lädt nebenläufig -- die Übersicht muss nicht darauf warten
  supabase.from('teachers').select('display_name').eq('id', session.user.id).single()
    .then(({ data: teacher }) => { document.getElementById('whoName').textContent = teacher.display_name; });

  function setCrumbs(items) {
    crumbs.innerHTML = items.map((it, i) =>
      `<span data-i="${i}">${it.label}</span>${i < items.length - 1 ? ' / ' : ''}`
    ).join('');
    crumbs.querySelectorAll('span').forEach(el => {
      el.addEventListener('click', () => items[+el.dataset.i].action());
    });
  }

  async function showOverview() {
    setCrumbs([{ label: 'Übersicht', action: showOverview }]);
    view.innerHTML = '<div class="section-title">Klassen & Kurse</div><div class="grid" id="classGrid"></div>';
    const grid = document.getElementById('classGrid');

    const { data: classes } = await supabase
      .from('classes').select('id, name, grade, type, capacity').order('grade').order('name');

    if (!classes || classes.length === 0) {
      view.innerHTML = '<div class="section-title">Klassen & Kurse</div><p class="empty">Noch keine Klasse/kein Kurs angelegt.</p>';
      return;
    }

    // Ein Query für alle Schüler-Zahlen statt einem Query pro Klasse
    const { data: allStudents } = await supabase.from('students').select('class_id');
    const countByClass = {};
    for (const s of allStudents ?? []) countByClass[s.class_id] = (countByClass[s.class_id] ?? 0) + 1;

    for (const c of classes) {
      const kindLabel = c.type === 'kurs' ? 'Kurs' : 'Klasse';
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.innerHTML = `<div class="tile-title">${c.name}</div><div class="tile-sub">${kindLabel} · Stufe ${c.grade} · ${countByClass[c.id] ?? 0} / ${c.capacity} Schüler</div>`;
      tile.addEventListener('click', () => showClassDetail(c));
      grid.appendChild(tile);
    }
  }

  const DIFF_LABEL = { 1: 'leicht', 2: 'mittel', 3: 'schwer' };

  async function showTaskPlanner(c) {
    setCrumbs([
      { label: 'Übersicht', action: showOverview },
      { label: c.name, action: () => showClassDetail(c) },
      { label: 'Aufgaben planen', action: () => showTaskPlanner(c) },
    ]);

    const { data: topics } = await supabase
      .from('topics').select('id, title, order_index').eq('grade', c.grade).order('order_index');

    if (!topics || topics.length === 0) {
      view.innerHTML = '<div class="section-title">Aufgaben planen — ' + c.name + '</div><p class="empty">Noch keine Kapitel für diese Stufe angelegt.</p>';
      return;
    }

    view.innerHTML = `
      <div class="section-title">Aufgaben planen — ${c.name}</div>
      <select id="topicSelect" class="topic-select">
        ${topics.map(t => `<option value="${t.id}">${t.order_index}. ${t.title}</option>`).join('')}
      </select>
      <div id="planList"></div>
    `;
    const select = document.getElementById('topicSelect');
    const planList = document.getElementById('planList');

    async function loadTopic(topicId) {
      planList.innerHTML = '<p class="empty">Lade …</p>';

      // Aufgaben und Freischaltungsstatus sind voneinander unabhängig -> parallel laden
      const [{ data: tasks, error }, { data: statusRows }] = await Promise.all([
        supabase
          .from('tasks')
          .select('id, title, content, page_number, section_title, difficulty, order_index')
          .eq('topic_id', topicId)
          .order('page_number', { ascending: true, nullsFirst: false })
          .order('order_index', { ascending: true }),
        // Freischaltungsstatus ist pro Klasse gespeichert (unterschiedliches Tempo je Klasse)
        supabase.from('class_task_status').select('task_id, published').eq('class_id', c.id),
      ]);

      if (error) {
        planList.innerHTML = '<p class="empty">Fehler beim Laden: ' + error.message + '</p>';
        return;
      }
      if (!tasks || tasks.length === 0) {
        planList.innerHTML = '<p class="empty">Für dieses Kapitel gibt es noch keine Aufgaben.</p>';
        return;
      }

      const publishedMap = Object.fromEntries((statusRows ?? []).map(r => [r.task_id, r.published]));
      for (const t of tasks) t.published = publishedMap[t.id] ?? false;

      // Nach Seite gruppieren, Reihenfolge bleibt erhalten (bereits sortiert)
      const groups = [];
      for (const t of tasks) {
        const key = `${t.page_number ?? ''}|${t.section_title ?? ''}`;
        let group = groups.find(gr => gr.key === key);
        if (!group) { group = { key, page: t.page_number, title: t.section_title, tasks: [] }; groups.push(group); }
        group.tasks.push(t);
      }

      planList.innerHTML = '';
      for (const group of groups) {
        const section = document.createElement('div');
        section.className = 'page-group';
        section.innerHTML = `
          <div class="page-group-head">
            ${group.page ? `<span class="page-num">S. ${group.page}</span>` : ''}
            <span class="page-group-title">${group.title ?? 'Ohne Seitenangabe'}</span>
          </div>
          <div class="page-group-body"></div>
        `;
        const body = section.querySelector('.page-group-body');

        for (const task of group.tasks) {
          const card = document.createElement('div');
          card.className = 'plan-card' + (task.published ? ' is-live' : '');
          card.innerHTML = `
            <div class="plan-main">
              <div class="plan-title-row">
                <span class="diff-dot" data-d="${task.difficulty ?? ''}" title="${DIFF_LABEL[task.difficulty] ?? 'unbekannt'}"></span>
                <span class="diff-label">${DIFF_LABEL[task.difficulty] ?? '–'}</span>
                <span class="plan-title">${task.title}</span>
              </div>
              <div class="plan-content">${task.content}</div>
            </div>
            <label class="toggle-wrap ${task.published ? 'on' : ''}">
              <span class="toggle-label">${task.published ? 'Live' : 'Aus'}</span>
              <span class="switch">
                <input type="checkbox" ${task.published ? 'checked' : ''}>
                <span class="switch-track"></span>
              </span>
            </label>
          `;
          const checkbox = card.querySelector('input[type=checkbox]');
          const toggleWrap = card.querySelector('.toggle-wrap');
          const toggleLabel = card.querySelector('.toggle-label');
          checkbox.addEventListener('change', async () => {
            const newVal = checkbox.checked;
            checkbox.disabled = true;
            const { error: updErr } = await supabase.from('class_task_status').upsert({
              class_id: c.id, task_id: task.id, published: newVal, updated_at: new Date().toISOString()
            }, { onConflict: 'class_id,task_id' });
            checkbox.disabled = false;
            if (updErr) {
              checkbox.checked = !newVal;
              alert('Konnte Status nicht ändern: ' + updErr.message);
              return;
            }
            task.published = newVal;
            card.classList.toggle('is-live', newVal);
            toggleWrap.classList.toggle('on', newVal);
            toggleLabel.textContent = newVal ? 'Live' : 'Aus';
          });
          body.appendChild(card);
        }
        planList.appendChild(section);
      }
    }

    select.addEventListener('change', () => loadTopic(select.value));
    loadTopic(select.value);
  }

  async function showClassDetail(c) {
    setCrumbs([
      { label: 'Übersicht', action: showOverview },
      { label: c.name, action: () => showClassDetail(c) },
    ]);

    // students/topics/statusRows sind voneinander unabhängig -> parallel laden
    const [{ data: students }, { data: topics }, { data: statusRows }] = await Promise.all([
      supabase.from('students').select('id, display_name').eq('class_id', c.id).order('display_name'),
      supabase.from('topics').select('id, title, order_index').eq('grade', c.grade).order('order_index'),
      supabase.from('class_task_status').select('task_id, published').eq('class_id', c.id).eq('published', true),
    ]);
    const publishedIds = new Set((statusRows ?? []).map(r => r.task_id));

    // allTasks braucht die Topic-IDs, submissions braucht die Schüler-IDs -> je von oben abhängig, aber selbst wieder parallel
    const [{ data: allTasks }, { data: submissions }] = await Promise.all([
      supabase.from('tasks').select('id, topic_id, order_index, title')
        .in('topic_id', (topics ?? []).map(t => t.id))
        .order('order_index'),
      supabase.from('submissions')
        .select('id, student_id, task_id, answer_text, status, evaluation, feedback, tasks(title)')
        .in('student_id', (students ?? []).map(s => s.id)),
    ]);
    const publishedTasks = (allTasks ?? []).filter(t => publishedIds.has(t.id));

    const tasksByTopic = {};
    for (const t of publishedTasks) (tasksByTopic[t.topic_id] ??= []).push(t);
    const activeTopics = (topics ?? []).filter(t => (tasksByTopic[t.id] ?? []).length > 0);

    const subByStudentTask = {};
    for (const s of submissions ?? []) subByStudentTask[`${s.student_id}|${s.task_id}`] = s;

    let html = `
      <div class="grid" style="margin-bottom:2rem;">
        <div class="tile" id="plannerTile">
          <div class="tile-title">📋 Aufgaben planen</div>
          <div class="tile-sub">für ${c.name} · nach Seite &amp; Schwierigkeit freischalten</div>
        </div>
      </div>
    `;
    html += '<div class="section-title">Schüler & Fortschritt (nur freigeschaltete Aufgaben)</div>';
    if (activeTopics.length === 0) {
      html += '<p class="empty">Noch keine Aufgaben freigeschaltet — siehe „Aufgaben planen".</p>';
    } else {
      for (const topic of activeTopics) {
        const topicTasks = tasksByTopic[topic.id];
        html += `<div class="chapter-sub">${topic.order_index}. ${topic.title}</div>`;
        html += '<table><tr><th>Name</th><th>Fortschritt</th></tr>';
        for (const s of students ?? []) {
          let done = 0;
          let dots = '';
          for (const t of topicTasks) {
            const sub = subByStudentTask[`${s.id}|${t.id}`];
            if (sub) {
              done++;
              const cls = sub.evaluation ? sub.evaluation : 'open';
              const titleAttr = sub.evaluation ? `${t.title}: bewertet` : `${t.title}: eingereicht, noch nicht bewertet`;
              dots += `<span class="eval-dot ${cls}" title="${titleAttr}"></span>`;
            } else {
              dots += `<span class="eval-dot pending" title="${t.title}: offen"></span>`;
            }
          }
          const pct = topicTasks.length ? Math.round((done / topicTasks.length) * 100) : 0;
          html += `<tr><td>${s.display_name}</td><td><span class="progress-bar"><i style="width:${pct}%"></i></span>${done} / ${topicTasks.length}<span class="dots">${dots}</span></td></tr>`;
        }
        html += '</table>';
      }
    }

    const pending = (submissions ?? []).filter(s => s.status !== 'graded');
    html += '<div class="section-title">Einreichungen zur Bewertung</div><div id="pendingList"></div>';
    view.innerHTML = html;

    document.getElementById('plannerTile').addEventListener('click', () => showTaskPlanner(c));

    const pendingList = document.getElementById('pendingList');
    if (pending.length === 0) {
      pendingList.innerHTML = '<p class="empty">Keine offenen Einreichungen.</p>';
    } else {
      for (const sub of pending) {
        const student = (students ?? []).find(s => s.id === sub.student_id);
        const card = document.createElement('div');
        card.className = 'submission-card';
        card.innerHTML = `
          <div class="submission-meta">${student?.display_name ?? '?'} — ${sub.tasks?.title ?? ''}</div>
          <div class="submission-answer">${sub.answer_text ?? '<i>(keine Antwort)</i>'}</div>
          <div class="grade-row">
            <input type="text" class="feedback-text" placeholder="Kurzes Feedback (immer angeben)">
            <button class="eval-btn green" type="button" data-eval="green">Richtig</button>
            <button class="eval-btn yellow" type="button" data-eval="yellow">Teilweise</button>
            <button class="eval-btn red" type="button" data-eval="red">Falsch</button>
          </div>
        `;
        card.querySelectorAll('.eval-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const feedbackVal = card.querySelector('.feedback-text').value.trim();
            if (!feedbackVal) {
              card.querySelector('.feedback-text').focus();
              return;
            }
            await supabase.from('submissions').update({
              status: 'graded',
              evaluation: btn.dataset.eval,
              feedback: feedbackVal,
              graded_at: new Date().toISOString()
            }).eq('id', sub.id);
            card.remove();
          });
        });
        pendingList.appendChild(card);
      }
    }
  }

  showOverview();
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.href = SITE_ROOT;
});
</script>
</body>
</html>
